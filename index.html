<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meeting Room Booking</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f4;
  --color-background-tertiary:#eeede9;
  --color-background-info:#e6f1fb;
  --color-background-danger:#fcebeb;
  --color-background-success:#eaf3de;
  --color-background-warning:#faeeda;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#5f5e5a;
  --color-text-tertiary:#888780;
  --color-text-info:#0c447c;
  --color-text-danger:#791f1f;
  --color-text-success:#27500a;
  --color-text-warning:#633806;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.22);
  --color-border-primary:rgba(0,0,0,0.32);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --border-radius-xl:16px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'SF Mono','Fira Code',monospace;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1c1c1a;
    --color-background-secondary:#242422;
    --color-background-tertiary:#2a2a28;
    --color-background-info:#0c2d4a;
    --color-background-danger:#3a1212;
    --color-background-success:#172d08;
    --color-background-warning:#3a2004;
    --color-text-primary:#e8e6df;
    --color-text-secondary:#a8a69f;
    --color-text-tertiary:#6e6c67;
    --color-text-info:#85b7eb;
    --color-text-danger:#f09595;
    --color-text-success:#97c459;
    --color-text-warning:#fac775;
    --color-border-tertiary:rgba(255,255,255,0.10);
    --color-border-secondary:rgba(255,255,255,0.18);
    --color-border-primary:rgba(255,255,255,0.28);
  }
}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);min-height:100vh;padding:1.5rem 1rem}
.app{max-width:960px;margin:0 auto}
.hidden{display:none!important}
.badge{padding:3px 10px;border-radius:var(--border-radius-md);font-size:11px;font-weight:500}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.field{margin-bottom:12px}
.field label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--color-text-info);box-shadow:0 0 0 2px rgba(12,68,124,0.15)}
.field textarea{height:72px;resize:vertical}
.btn{padding:7px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent;font-weight:500}
.btn-primary:hover{opacity:.9}
.btn-danger{background:var(--color-background-danger);color:var(--color-text-danger);border-color:transparent}
.btn-danger:hover{opacity:.9}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-warn{background:var(--color-background-warning);color:var(--color-text-warning);border-color:transparent}
.btn-warn:hover{opacity:.9}
.nav{display:flex;gap:4px;margin-bottom:1.5rem;flex-wrap:wrap;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:12px}
.nav-btn{padding:6px 14px;border-radius:var(--border-radius-md);border:none;font-size:13px;cursor:pointer;background:none;color:var(--color-text-secondary);font-family:var(--font-sans)}
.nav-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-header h3{font-size:16px;font-weight:500;color:var(--color-text-primary)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:500;font-size:12px;color:var(--color-text-secondary);padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
.week-grid{display:grid;gap:0;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;overflow-x:auto}
.day-lbl{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-align:center;padding:8px 2px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.time-lbl{font-size:10px;color:var(--color-text-tertiary);padding:0 6px;border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:flex;align-items:center;height:32px;min-width:52px}
.slot{height:32px;border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);cursor:pointer;position:relative;transition:background .1s}
.slot:hover{background:var(--color-background-secondary)}
.slot-inner{position:absolute;inset:1px;border-radius:3px;padding:1px 4px;font-size:10px;font-weight:500;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.5rem;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary)}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap}
.alert{padding:8px 12px;border-radius:var(--border-radius-md);font-size:12px;margin-bottom:10px}
.alert-danger{background:var(--color-background-danger);color:var(--color-text-danger)}
.alert-warn{background:var(--color-background-warning);color:var(--color-text-warning)}
.row2{display:flex;gap:8px}
.row2 .field{flex:1}
.chip{display:inline-block;padding:2px 8px;border-radius:var(--border-radius-md);font-size:11px;margin-right:4px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">

<div id="login-view">
  <div style="max-width:320px;margin:3rem auto">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:2rem">
      <i class="ti ti-building" style="font-size:26px;color:var(--color-text-secondary)" aria-hidden="true"></i>
      <span style="font-size:20px;font-weight:500;color:var(--color-text-primary)">Meeting Room Booking</span>
    </div>
    <div class="card">
      <div class="field"><label>Service number</label><input type="text" id="li-svc" placeholder="e.g. SVC001" /></div>
      <div class="field"><label>Password</label><input type="password" id="li-pwd" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" /></div>
      <div id="li-err" class="alert alert-danger hidden"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign in</button>
      <p style="font-size:11px;color:var(--color-text-tertiary);margin-top:10px;text-align:center">Admin: SVC000 / admin123</p>
    </div>
  </div>
</div>

<div id="main-view" class="hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:8px">
      <i class="ti ti-building" style="font-size:20px;color:var(--color-text-secondary)" aria-hidden="true"></i>
      <span style="font-size:16px;font-weight:500;color:var(--color-text-primary)">Meeting Room Booking</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="session-badge" class="badge" style="background:var(--color-background-info);color:var(--color-text-info)"></span>
      <button class="btn btn-sm" onclick="doLogout()"><i class="ti ti-logout" aria-hidden="true"></i>Sign out</button>
    </div>
  </div>

  <div class="nav" id="main-nav"></div>

  <div id="tab-calendar" class="hidden">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="prevWeek()"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <span id="week-lbl" style="font-size:14px;font-weight:500;color:var(--color-text-primary);min-width:160px;text-align:center"></span>
      <button class="btn btn-sm" onclick="nextWeek()"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
      <select id="room-sel" onchange="renderCal()" style="font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)"></select>
    </div>
    <div class="legend" id="cal-legend"></div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <div id="tab-admin" class="hidden">
    <div class="grid2">
      <div class="card">
        <div class="section-header"><h3><i class="ti ti-users" aria-hidden="true" style="margin-right:6px"></i>Sections</h3><button class="btn btn-sm btn-primary" onclick="openModal('add-section')"><i class="ti ti-plus" aria-hidden="true"></i>Add</button></div>
        <table id="sections-table"><thead><tr><th>Name</th><th></th></tr></thead><tbody></tbody></table>
      </div>
      <div class="card">
        <div class="section-header"><h3><i class="ti ti-door" aria-hidden="true" style="margin-right:6px"></i>Rooms</h3><button class="btn btn-sm btn-primary" onclick="openModal('add-room')"><i class="ti ti-plus" aria-hidden="true"></i>Add</button></div>
        <table id="rooms-table"><thead><tr><th>Room</th><th>End time</th><th></th></tr></thead><tbody></tbody></table>
      </div>
    </div>
    <div class="card">
      <div class="section-header"><h3><i class="ti ti-user-circle" aria-hidden="true" style="margin-right:6px"></i>Staff accounts</h3><button class="btn btn-sm btn-primary" onclick="openModal('add-staff')"><i class="ti ti-plus" aria-hidden="true"></i>Add staff</button></div>
      <div style="overflow-x:auto">
        <table id="staff-table">
          <thead><tr><th>Service no.</th><th>Name</th><th>Section</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-prebooking" class="hidden">
    <div class="card">
      <div class="section-header"><h3><i class="ti ti-calendar-event" aria-hidden="true" style="margin-right:6px"></i>Admin pre-bookings</h3><button class="btn btn-sm btn-primary" onclick="openModal('add-prebook')"><i class="ti ti-plus" aria-hidden="true"></i>New pre-booking</button></div>
      <div style="overflow-x:auto">
        <table id="prebook-table">
          <thead><tr><th>Room</th><th>Date</th><th>Time</th><th>Reason</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="modal-area"></div>

<script>
const PALETTE=[{bg:'#E6F1FB',text:'#0C447C',border:'#B5D4F4'},{bg:'#E1F5EE',text:'#085041',border:'#9FE1CB'},{bg:'#FAEEDA',text:'#633806',border:'#FAC775'},{bg:'#EEEDFE',text:'#3C3489',border:'#CECBF6'},{bg:'#FAECE7',text:'#712B13',border:'#F5C4B3'},{bg:'#FBEAF0',text:'#72243E',border:'#F4C0D1'},{bg:'#EAF3DE',text:'#27500A',border:'#C0DD97'},{bg:'#FCEBEB',text:'#791F1F',border:'#F7C1C1'}];
let sectionColors={};
function getSectionColor(sec){
  if(!sec)return{bg:'#F1EFE8',text:'#2C2C2A',border:'#B4B2A9'};
  if(!sectionColors[sec]){const idx=Object.keys(sectionColors).length%PALETTE.length;sectionColors[sec]=PALETTE[idx];}
  return sectionColors[sec];
}

let db={
  sections:['Management','Finance','HR','IT','Operations','Sales'],
  rooms:[{id:1,name:'Room A',endHour:20},{id:2,name:'Room B',endHour:20}],
  staff:[{svcNo:'SVC000',name:'Administrator',section:null,password:'admin123',role:'admin',active:true}],
  bookings:[],
  preBookings:[]
};

function saveDB(){try{localStorage.setItem('mrb_db',JSON.stringify(db));}catch(e){}}
function loadDB(){try{const d=localStorage.getItem('mrb_db');if(d){db=JSON.parse(d);db.sections.forEach(s=>getSectionColor(s));}}catch(e){}}

let currentUser=null,weekOffset=0;

function doLogin(){
  const svc=document.getElementById('li-svc').value.trim();
  const pwd=document.getElementById('li-pwd').value;
  const user=db.staff.find(s=>s.svcNo===svc&&s.password===pwd&&s.active!==false);
  const err=document.getElementById('li-err');
  if(!user){err.textContent='Invalid service number or password.';err.classList.remove('hidden');return;}
  err.classList.add('hidden');
  currentUser=user;
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('main-view').classList.remove('hidden');
  document.getElementById('session-badge').textContent=`${user.name}${user.section?' · '+user.section:''}`;
  buildNav();
}
function doLogout(){currentUser=null;document.getElementById('main-view').classList.add('hidden');document.getElementById('login-view').classList.remove('hidden');document.getElementById('li-svc').value='';document.getElementById('li-pwd').value='';}

function buildNav(){
  const nav=document.getElementById('main-nav');nav.innerHTML='';
  const tabs=currentUser.role==='admin'?['Calendar','Admin panel','Pre-bookings']:['Calendar'];
  tabs.forEach((t,i)=>{
    const b=document.createElement('button');b.className='nav-btn'+(i===0?' active':'');b.textContent=t;
    b.onclick=()=>{document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');showTab(t);};
    nav.appendChild(b);
  });
  showTab('Calendar');
}
function showTab(t){
  ['tab-calendar','tab-admin','tab-prebooking'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  if(t==='Calendar'){document.getElementById('tab-calendar').classList.remove('hidden');buildRoomSel();renderCal();}
  if(t==='Admin panel'){document.getElementById('tab-admin').classList.remove('hidden');renderAdmin();}
  if(t==='Pre-bookings'){document.getElementById('tab-prebooking').classList.remove('hidden');renderPrebook();}
}
function buildRoomSel(){
  const sel=document.getElementById('room-sel');
  sel.innerHTML=db.rooms.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');
}

function getWeekStart(){const n=new Date();n.setDate(n.getDate()+weekOffset*7);const d=n.getDay();n.setDate(n.getDate()+(d===0?-6:1-d));n.setHours(0,0,0,0);return n;}
function prevWeek(){weekOffset--;renderCal();}
function nextWeek(){weekOffset++;renderCal();}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(slot,startHour){const h=Math.floor(slot/2)+startHour;const m=slot%2===0?'00':'30';return`${String(h).padStart(2,'0')}:${m}`;}
function dateStr(d){return d.toISOString().split('T')[0];}

function renderCal(){
  const ws=getWeekStart();const we=new Date(ws);we.setDate(we.getDate()+6);
  document.getElementById('week-lbl').textContent=`${fmtDate(ws)} – ${fmtDate(we)}`;
  const roomId=parseInt(document.getElementById('room-sel').value);
  const room=db.rooms.find(r=>r.id===roomId);if(!room)return;
  const START=8,END=room.endHour,SLOTS=(END-START)*2;
  const dates=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d;});
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today=new Date();today.setHours(0,0,0,0);
  const grid=document.getElementById('week-grid');grid.innerHTML='';
  grid.style.gridTemplateColumns=`52px repeat(7,minmax(80px,1fr))`;

  const corner=document.createElement('div');corner.className='day-lbl';corner.style.borderRight='0.5px solid var(--color-border-tertiary)';grid.appendChild(corner);
  dates.forEach((d,i)=>{
    const c=document.createElement('div');c.className='day-lbl';
    const isToday=d.getTime()===today.getTime();
    if(isToday)c.style.cssText='background:var(--color-background-info);color:var(--color-text-info);font-weight:500';
    if(i<6)c.style.borderRight='0.5px solid var(--color-border-tertiary)';
    c.innerHTML=`${days[i]}<br><span style="font-size:11px">${d.getDate()}</span>`;
    grid.appendChild(c);
  });

  const legend=document.getElementById('cal-legend');legend.innerHTML='';
  db.sections.forEach(sec=>{const c=getSectionColor(sec);const li=document.createElement('div');li.className='legend-item';li.innerHTML=`<div class="legend-dot" style="background:${c.bg};border:1px solid ${c.border}"></div>${sec}`;legend.appendChild(li);});
  const ac={bg:'#F1EFE8',text:'#2C2C2A',border:'#B4B2A9'};
  const ali=document.createElement('div');ali.className='legend-item';ali.innerHTML=`<div class="legend-dot" style="background:${ac.bg};border:1px solid ${ac.border}"></div>Admin reserved`;legend.appendChild(ali);

  for(let s=0;s<SLOTS;s++){
    const tl=document.createElement('div');tl.className='time-lbl';tl.textContent=fmtTime(s,START);
    if(s===SLOTS-1)tl.style.borderBottom='none';
    grid.appendChild(tl);
    dates.forEach((d,di)=>{
      const cell=document.createElement('div');cell.className='slot';
      const ds=dateStr(d);
      const booking=findBooking(roomId,ds,s);
      const prebook=findPrebook(roomId,ds,s);
      const isPast=d<today;
      if(s===SLOTS-1)cell.style.borderBottom='none';
      if(di<6)cell.style.borderRight='0.5px solid var(--color-border-tertiary)';
      if(prebook){
        const c=ac;cell.style.background=c.bg;
        if(prebook.startSlot===s){const inn=document.createElement('div');inn.className='slot-inner';inn.style.cssText=`background:${c.bg};color:${c.text};border:0.5px solid ${c.border}`;inn.innerHTML=`<span style="font-weight:500">Admin</span><span style="opacity:.75;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${prebook.reason.substring(0,20)}</span>`;cell.appendChild(inn);}
        cell.onclick=()=>openViewModal(null,prebook,true);
      } else if(booking){
        const c=getSectionColor(booking.section);cell.style.background=c.bg;
        if(booking.startSlot===s){const inn=document.createElement('div');inn.className='slot-inner';inn.style.cssText=`background:${c.bg};color:${c.text};border:0.5px solid ${c.border}`;inn.innerHTML=`<span style="font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${booking.section}</span><span style="opacity:.75;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${booking.reason.substring(0,20)}</span>`;cell.appendChild(inn);}
        cell.onclick=()=>openViewModal(booking,null,false);
      } else if(!isPast){
        cell.onclick=()=>openBookModal(ds,s,START,roomId);
      } else {
        cell.style.opacity='0.35';cell.style.cursor='default';
      }
      grid.appendChild(cell);
    });
  }
}

function findBooking(roomId,ds,slot){return db.bookings.find(b=>b.roomId===roomId&&b.date===ds&&slot>=b.startSlot&&slot<b.startSlot+b.duration)||null;}
function findPrebook(roomId,ds,slot){return db.preBookings.find(b=>b.roomId===roomId&&b.date===ds&&slot>=b.startSlot&&slot<b.startSlot+b.duration)||null;}

function openBookModal(ds,slot,startHour,roomId){
  const room=db.rooms.find(r=>r.id===roomId);
  const maxSlots=(room.endHour-startHour)*2-slot;
  const d=new Date(ds);const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let opts='';
  for(let i=1;i<=maxSlots;i++){const mins=i*30;const label=mins<60?`${mins} min`:`${Math.floor(mins/60)}h${mins%60>0?' '+mins%60+'min':''}`;opts+=`<option value="${i}">${label}</option>`;}
  showModal(`<h3>Book ${room.name}</h3>
    <div class="field"><label>Date &amp; start time</label><input readonly value="${days[d.getDay()]}, ${fmtDate(d)} at ${fmtTime(slot,startHour)}" style="background:var(--color-background-secondary);color:var(--color-text-secondary)" /></div>
    <div class="field"><label>Duration (minimum 30 min)</label><select id="m-dur">${opts}</select></div>
    <div class="field"><label>Reason / purpose</label><textarea id="m-reason" placeholder="What is this meeting for?"></textarea></div>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">Booking as: ${currentUser.name}${currentUser.section?' ('+currentUser.section+')':''}</p>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBooking(${roomId},'${ds}',${slot},${startHour})">Confirm booking</button>
    </div>`);
}
function saveBooking(roomId,ds,slot,startHour){
  const reason=document.getElementById('m-reason').value.trim();
  if(!reason){alert('Please enter a reason.');return;}
  const dur=parseInt(document.getElementById('m-dur').value);
  for(let i=0;i<dur;i++){if(findBooking(roomId,ds,slot+i)||findPrebook(roomId,ds,slot+i)){alert('A slot in your selected range is already taken.');return;}}
  db.bookings.push({id:Date.now(),roomId,date:ds,startSlot:slot,duration:dur,reason,section:currentUser.section,bookedBy:currentUser.name,svcNo:currentUser.svcNo,startHour});
  saveDB();closeModal();renderCal();
}
function openViewModal(b,pb,isPrebook){
  const room=db.rooms.find(r=>r.id===(b||pb).roomId);
  const item=b||pb;
  const c=isPrebook?{bg:'#F1EFE8',text:'#2C2C2A',border:'#B4B2A9'}:getSectionColor(item.section);
  const canEdit=currentUser.role==='admin'||(b&&currentUser.section===b.section&&currentUser.svcNo===b.svcNo);
  showModal(`<h3>${room?room.name:'Room'} · ${new Date(item.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</h3>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span style="font-size:13px;color:var(--color-text-secondary)">${fmtTime(item.startSlot,8)} – ${fmtTime(item.startSlot+item.duration,8)}</span>
      <span class="badge" style="background:${c.bg};color:${c.text}">${isPrebook?'Admin reserved':item.section}</span>
    </div>
    <div class="field"><label>Booked by</label><p style="font-size:14px;color:var(--color-text-primary)">${item.bookedBy||'Administrator'}</p></div>
    <div class="field"><label>Reason</label><p style="font-size:14px;color:var(--color-text-primary)">${item.reason}</p></div>
    ${!canEdit?`<div class="alert alert-warn">Only ${isPrebook?'admin':item.section} can modify this booking.</div>`:''}
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Close</button>
      ${canEdit?`<button class="btn btn-danger" onclick="deleteItem('${item.id}',${isPrebook})">Remove</button>`:''}
    </div>`);
}
function deleteItem(id,isPrebook){
  const idN=parseInt(id);
  if(isPrebook){db.preBookings=db.preBookings.filter(b=>b.id!==idN);}
  else{const b=db.bookings.find(x=>x.id===idN);if(!b)return;if(currentUser.role!=='admin'&&(currentUser.section!==b.section||currentUser.svcNo!==b.svcNo)){alert('You cannot remove this booking.');return;}db.bookings=db.bookings.filter(x=>x.id!==idN);}
  saveDB();closeModal();renderCal();
}

function renderAdmin(){
  const sb=document.querySelector('#sections-table tbody');
  sb.innerHTML=db.sections.map(s=>{const c=getSectionColor(s);return`<tr><td><span class="chip" style="background:${c.bg};color:${c.text}">${s}</span></td><td><button class="btn btn-sm btn-danger" onclick="deleteSection('${s}')"><i class="ti ti-trash" aria-hidden="true"></i></button></td></tr>`;}).join('');
  const rb=document.querySelector('#rooms-table tbody');
  rb.innerHTML=db.rooms.map(r=>`<tr><td>${r.name}</td><td>${r.endHour}:00</td><td style="white-space:nowrap"><button class="btn btn-sm btn-warn" onclick="openModal('edit-room',${r.id})"><i class="ti ti-edit" aria-hidden="true"></i></button><button class="btn btn-sm btn-danger" style="margin-left:4px" onclick="deleteRoom(${r.id})"><i class="ti ti-trash" aria-hidden="true"></i></button></td></tr>`).join('');
  const stb=document.querySelector('#staff-table tbody');
  stb.innerHTML=db.staff.filter(s=>s.role!=='admin').map(s=>`<tr>
    <td style="font-family:var(--font-mono);font-size:12px">${s.svcNo}</td>
    <td>${s.name}</td>
    <td><span class="chip" style="background:${getSectionColor(s.section).bg};color:${getSectionColor(s.section).text}">${s.section}</span></td>
    <td><span class="badge" style="background:${s.active?'var(--color-background-success)':'var(--color-background-danger)'};color:${s.active?'var(--color-text-success)':'var(--color-text-danger)'}">${s.active?'Active':'Inactive'}</span></td>
    <td style="white-space:nowrap;display:flex;gap:4px;flex-wrap:wrap">
      <button class="btn btn-sm btn-warn" onclick="openModal('edit-staff','${s.svcNo}')"><i class="ti ti-edit" aria-hidden="true"></i></button>
      <button class="btn btn-sm" onclick="openModal('reset-pwd','${s.svcNo}')"><i class="ti ti-lock" aria-hidden="true"></i>Reset pwd</button>
      <button class="btn btn-sm btn-danger" onclick="toggleStaff('${s.svcNo}')">${s.active?'Deactivate':'Activate'}</button>
    </td></tr>`).join('');
}
function deleteSection(s){if(!confirm(`Remove section "${s}"?`))return;db.sections=db.sections.filter(x=>x!==s);delete sectionColors[s];saveDB();renderAdmin();}
function deleteRoom(id){if(!confirm('Remove this room?'))return;db.rooms=db.rooms.filter(r=>r.id!==id);saveDB();renderAdmin();buildRoomSel();}
function toggleStaff(svc){const s=db.staff.find(x=>x.svcNo===svc);if(s)s.active=!s.active;saveDB();renderAdmin();}

function openModal(type,id){
  if(type==='add-section'){
    showModal(`<h3>Add section</h3>
      <div class="field"><label>Section name</label><input id="m-sec-name" placeholder="e.g. Legal" /></div>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveSection()">Add</button></div>`);
  } else if(type==='add-room'){
    showModal(`<h3>Add meeting room</h3>
      <div class="field"><label>Room name</label><input id="m-room-name" placeholder="e.g. Conference Room C" /></div>
      <div class="field"><label>Booking end time</label><select id="m-room-end">${Array.from({length:12},(_,i)=>i+9).map(h=>`<option value="${h}"${h===20?' selected':''}>${h}:00</option>`).join('')}</select></div>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveRoom()">Add room</button></div>`);
  } else if(type==='edit-room'){
    const r=db.rooms.find(x=>x.id===id);
    showModal(`<h3>Edit ${r.name}</h3>
      <div class="field"><label>Room name</label><input id="m-room-name" value="${r.name}" /></div>
      <div class="field"><label>Booking end time</label><select id="m-room-end">${Array.from({length:12},(_,i)=>i+9).map(h=>`<option value="${h}"${h===r.endHour?' selected':''}>${h}:00</option>`).join('')}</select></div>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveRoom(${id})">Save</button></div>`);
  } else if(type==='add-staff'){
    showModal(`<h3>Add staff account</h3>
      <div class="row2"><div class="field"><label>Service number</label><input id="m-svc" placeholder="SVC###" /></div><div class="field"><label>Temporary password</label><input type="text" id="m-pass" /></div></div>
      <div class="field"><label>Full name</label><input id="m-sname" /></div>
      <div class="field"><label>Section</label><select id="m-ssec">${db.sections.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveStaff()">Create account</button></div>`);
  } else if(type==='edit-staff'){
    const s=db.staff.find(x=>x.svcNo===id);
    showModal(`<h3>Edit staff</h3>
      <div class="field"><label>Service number</label><input readonly value="${s.svcNo}" style="background:var(--color-background-secondary);color:var(--color-text-secondary)" /></div>
      <div class="field"><label>Full name</label><input id="m-sname" value="${s.name}" /></div>
      <div class="field"><label>Section</label><select id="m-ssec">${db.sections.map(sec=>`<option${sec===s.section?' selected':''}>${sec}</option>`).join('')}</select></div>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updateStaff('${id}')">Save</button></div>`);
  } else if(type==='reset-pwd'){
    const s=db.staff.find(x=>x.svcNo===id);
    showModal(`<h3>Reset password — ${s.name}</h3>
      <div class="field"><label>New password</label><input type="text" id="m-newpwd" placeholder="Enter new password" /></div>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="resetPwd('${id}')">Reset</button></div>`);
  } else if(type==='add-prebook'){
    showModal(`<h3>Admin pre-booking</h3>
      <div class="row2">
        <div class="field"><label>Room</label><select id="m-pb-room">${db.rooms.map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}</select></div>
        <div class="field"><label>Date</label><input type="date" id="m-pb-date" /></div>
      </div>
      <div class="row2">
        <div class="field"><label>Start time</label><select id="m-pb-start">${Array.from({length:24},(_,i)=>{const h=8+Math.floor(i/2);const m=i%2===0?'00':'30';return`<option value="${i}">${String(h).padStart(2,'0')}:${m}</option>`;}).join('')}</select></div>
        <div class="field"><label>Duration</label><select id="m-pb-dur">${Array.from({length:32},(_,i)=>{const mins=(i+1)*30;const l=mins<60?`${mins} min`:`${Math.floor(mins/60)}h${mins%60?` ${mins%60}min`:''}`;return`<option value="${i+1}">${l}</option>`;}).join('')}</select></div>
      </div>
      <div class="field"><label>Reason</label><textarea id="m-pb-reason"></textarea></div>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="savePrebook()">Reserve</button></div>`);
  }
}
function saveSection(){const n=document.getElementById('m-sec-name').value.trim();if(!n)return;if(db.sections.includes(n)){alert('Already exists.');return;}db.sections.push(n);saveDB();closeModal();renderAdmin();}
function saveRoom(id){
  const name=document.getElementById('m-room-name').value.trim();
  const end=parseInt(document.getElementById('m-room-end').value);
  if(!name)return;
  if(id){const r=db.rooms.find(x=>x.id===id);r.name=name;r.endHour=end;}
  else db.rooms.push({id:Date.now(),name,endHour:end});
  saveDB();closeModal();renderAdmin();buildRoomSel();
}
function saveStaff(){
  const svc=document.getElementById('m-svc').value.trim();
  const pwd=document.getElementById('m-pass').value.trim();
  const name=document.getElementById('m-sname').value.trim();
  const sec=document.getElementById('m-ssec').value;
  if(!svc||!pwd||!name){alert('Fill all fields.');return;}
  if(db.staff.find(s=>s.svcNo===svc)){alert('Service number already exists.');return;}
  db.staff.push({svcNo:svc,name,section:sec,password:pwd,role:'staff',active:true});
  saveDB();closeModal();renderAdmin();
}
function updateStaff(svc){const s=db.staff.find(x=>x.svcNo===svc);s.name=document.getElementById('m-sname').value.trim();s.section=document.getElementById('m-ssec').value;saveDB();closeModal();renderAdmin();}
function resetPwd(svc){const pwd=document.getElementById('m-newpwd').value.trim();if(!pwd){alert('Enter a password.');return;}db.staff.find(s=>s.svcNo===svc).password=pwd;saveDB();closeModal();alert('Password reset successfully.');}
function savePrebook(){
  const roomId=parseInt(document.getElementById('m-pb-room').value);
  const date=document.getElementById('m-pb-date').value;
  const startSlot=parseInt(document.getElementById('m-pb-start').value);
  const dur=parseInt(document.getElementById('m-pb-dur').value);
  const reason=document.getElementById('m-pb-reason').value.trim();
  if(!date||!reason){alert('Fill all fields.');return;}
  for(let i=0;i<dur;i++){if(findBooking(roomId,date,startSlot+i)||findPrebook(roomId,date,startSlot+i)){alert('A slot in this range is already taken.');return;}}
  db.preBookings.push({id:Date.now(),roomId,date,startSlot,duration:dur,reason,bookedBy:'Administrator'});
  saveDB();closeModal();renderPrebook();
}
function renderPrebook(){
  const tb=document.querySelector('#prebook-table tbody');
  tb.innerHTML=db.preBookings.length?db.preBookings.map(b=>{const room=db.rooms.find(r=>r.id===b.roomId);return`<tr>
    <td>${room?room.name:'—'}</td>
    <td>${new Date(b.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</td>
    <td style="white-space:nowrap">${fmtTime(b.startSlot,8)} – ${fmtTime(b.startSlot+b.duration,8)}</td>
    <td>${b.reason}</td>
    <td><button class="btn btn-sm btn-danger" onclick="deletePrebook(${b.id})"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
  </tr>`;}).join(''):`<tr><td colspan="5" style="color:var(--color-text-tertiary);text-align:center;padding:1rem">No pre-bookings yet.</td></tr>`;
}
function deletePrebook(id){db.preBookings=db.preBookings.filter(b=>b.id!==id);saveDB();renderPrebook();}
function showModal(html){document.getElementById('modal-area').innerHTML=`<div class="overlay"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-area').innerHTML='';}

loadDB();
db.sections.forEach(s=>getSectionColor(s));
</script>
</body>
</html>
